services:
  - type: web
    name: teacher-helper
    runtime: python
    plan: free
    region: virginia
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESET_DB_ON_START
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ALLOW_ORIGINS
        value: "*"
      - key: LLM_PROVIDER
        value: "openai"
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: DUPLICATE_LESSON_POLICY
        value: "reject"
      - key: SESSION_TIMEOUT_MINUTES
        value: "30"
      - key: SUPPORTED_LANGUAGES
        value: "English"
      - key: OPENAI_API_KEY
        sync: false