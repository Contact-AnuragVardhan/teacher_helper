services:
  - type: web
    name: teacher-helper
    runtime: python
    plan: free
    region: virginia
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"

      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_BASE_URL
        value: "https://api.openai.com/v1"
      - key: OPENAI_MODEL
        value: "gpt-5.4"
      - key: LLM_PROVIDER
        value: "openai"
      - key: RESET_DB_ON_START
        value: "false"
      - key: DUPLICATE_LESSON_POLICY
        value: "reject"
      - key: SESSION_TIMEOUT_MINUTES
        value: "30"
      - key: SUPPORTED_LANGUAGES
        value: "Hindi,English,Hinglish"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ALLOW_ORIGINS
        value: "*"
      - key: NCERT_CHUNK_SIZE
        value: "650"
      - key: NCERT_TOP_K
        value: "3"
      - key: PROFILE_ALLOWED_GRADES
        value: "5,11"
      - key: PROFILE_ALLOWED_SUBJECTS_BY_GRADE
        value: "5:English;11:English|Physics"
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_GRAPH_VERSION
        value: "v25.0"
      - key: WHATSAPP_API_TIMEOUT_SECONDS
        value: "15"