services:
  - type: web
    name: teacher-helper
    runtime: python
    plan: free
    region: virginia
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_BASE_URL
        value: "https://api.openai.com/v1"
      - key: OPENAI_MODEL
        value: "gpt-5.4-mini"
      - key: LLM_PROVIDER
        value: "openai"
      - key: RESET_DB_ON_START
        value: "false"
      - key: DUPLICATE_LESSON_POLICY
        value: "reject"
      - key: SESSION_TIMEOUT_MINUTES
        value: "30"
      - key: SUPPORTED_LANGUAGES
        value: "English"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ALLOW_ORIGINS
        value: "*"
      - key: NCERT_CHUNK_SIZE
        value: "650"
      - key: NCERT_TOP_K
        value: "3"
      - key: PROFILE_ALLOWED_GRADES
        value: "5,11"
      - key: PROFILE_ALLOWED_SUBJECTS_BY_GRADE
        value: "5:English;11:English|Physics"